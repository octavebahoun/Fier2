# DÉFINITIONS DES STATUTS (STATUS DEFINITIONS) :
# ============================================
# Statut de l'Epic (Epic Status) :
#   - backlog : L'Epic n'a pas encore commencé
#   - in-progress : L'Epic est activement en cours de développement
#   - done : Toutes les stories de l'Epic sont terminées
#
# Transitions de statut d'Epic (Epic Status Transitions) :
#   - backlog → in-progress : Automatiquement lors de la création de la première story (via create-story)
#   - in-progress → done : Manuellement quand toutes les stories atteignent le statut 'done'
#
# Statut de la Story (Story Status) :
#   - backlog : La story existe uniquement dans le fichier des epics
#   - ready-for-dev : Le fichier de la story a été créé dans le dossier des stories (stories folder)
#   - in-progress : Le développeur travaille activement sur l'implémentation
#   - review : Prêt pour la revue de code (via le workflow code-review du développeur)
#   - done : Story terminée
#
# Statut de la Rétrospective (Retrospective Status) :
#   - optional : Peut être réalisée mais n'est pas requise
#   - done : La rétrospective a été complétée
#
# NOTES DE WORKFLOW (WORKFLOW NOTES) :
# ===================================
# - Un Epic passe à 'in-progress' automatiquement lorsque sa première story est créée.
# - Les stories peuvent être traitées en parallèle selon la capacité de l'équipe.
# - Le développeur crée généralement la story suivante après que la précédente soit 'done' pour intégrer les apprentissages.
# - Le développeur passe la story à 'review', puis lance le workflow code-review.
 
